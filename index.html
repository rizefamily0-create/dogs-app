<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    background:#0b0c10;
    color:white;
    font-family:system-ui;
    height:100vh;
    overflow:hidden;
    padding-bottom:env(safe-area-inset-bottom);
}

.app{
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:16px;
    padding-bottom:90px;
    box-sizing:border-box;
}

.page{display:none;}
.page.active{display:block;}

.balance{
    font-size:34px;
    text-align:center;
    color:#f5c542;
}

.timer{
    text-align:center;
    color:#aaa;
    font-size:13px;
}

.dog{
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.dog img{
    width:140px;
    border-radius:18px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#f5c542;
    font-weight:800;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#15161c;
    color:white;
    margin-top:10px;
}

.nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
    background:#15161c;
    border-top:1px solid #222;
    padding:10px;
    z-index:999;
}

.nav-item{
    flex:1;
    text-align:center;
    color:#aaa;
    font-size:11px;
}

.nav-item span{
    display:block;
    font-size:22px;
}

.nav-item.active{
    color:#f5c542;
}
</style>
</head>

<body>

<div class="app">

<div id="faucet" class="page active">
    <div class="balance">0 DOGS</div>
    <div class="timer">Next claim: ready</div>

    <div class="dog">
        <img src="https://i.imgur.com/3G5bQ9V.png">
    </div>

    <button onclick="claim()">CLAIM</button>
</div>

<div id="withdraw" class="page">
    <div class="balance">0 DOGS</div>

    <input id="amount" placeholder="Amount">
    <input id="wallet" placeholder="TON wallet">
    <input id="memo" placeholder="Memo">

    <button onclick="withdraw()">WITHDRAW</button>
</div>

<div id="tasks" class="page">
    <div class="balance">SOON</div>
</div>

<div id="ref" class="page">
    <div class="balance">SOON</div>
</div>

</div>

<div class="nav">
    <div class="nav-item active" onclick="tab('faucet')"><span>🐶</span>Claim</div>
    <div class="nav-item" onclick="tab('withdraw')"><span>💸</span>Withdraw</div>
    <div class="nav-item" onclick="soon()"><span>📋</span>Tasks</div>
    <div class="nav-item" onclick="soon()"><span>👥</span>Ref</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function tab(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function soon(){
    alert("Coming soon");
}

async function claim(){
    const r = await fetch("https://YOUR-API/claim",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({user_id:tg.initDataUnsafe.user.id})
    });
    const d = await r.json();
    alert(d.ok ? "+"+d.reward : d.error);
}

async function withdraw(){
    const r = await fetch("https://YOUR-API/withdraw",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            user_id:tg.initDataUnsafe.user.id,
            wallet:document.getElementById("wallet").value
        })
    });
    const d = await r.json();
    alert(d.ok ? "Sent" : "Error");
}
</script>

</body>
</html>
