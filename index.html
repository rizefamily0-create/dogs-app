<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
<h2>DOGS Faucet</h2>

<p>Balance will be shown in future update</p>

<button onclick="claim()">🚀 Claim 100 DOGS</button>

<br><br>

<input id="wallet" placeholder="TON wallet">
<button onclick="withdraw()">💸 Withdraw</button>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

function claim() {
    tg.sendData(JSON.stringify({
        action: "claim"
    }));
}

function withdraw() {
    tg.sendData(JSON.stringify({
        action: "withdraw",
        wallet: document.getElementById("wallet").value
    }));
}
</script>

</body>
</html>
