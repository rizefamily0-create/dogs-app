<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    background:#0b0c10;
    color:white;
    font-family:system-ui;
}

.app{
    max-width:420px;
    margin:auto;
    padding:16px;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.card{
    background:#15161c;
    padding:16px;
    border-radius:16px;
    margin-top:10px;
}

.balance{
    font-size:34px;
    color:#f5c542;
    text-align:center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#f5c542;
    font-weight:800;
}

input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#0f1117;
    color:white;
}

.view{
    display:none;
    opacity:0;
    transform:translateY(10px);
    transition:0.25s;
}

.view.active{
    display:block;
    opacity:1;
    transform:translateY(0);
}

.tabs{
    display:flex;
    margin-top:auto;
    gap:10px;
}

.tab{
    flex:1;
    text-align:center;
    padding:12px;
    background:#15161c;
    border-radius:12px;
    color:#aaa;
}

.tab.active{
    background:#f5c542;
    color:#111;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
    Balance: <div class="balance" id="bal">0</div>
</div>

<div class="view active" id="faucet">
    <div class="card">
        <button onclick="claim()">Claim</button>
    </div>
</div>

<div class="view" id="withdraw">
    <div class="card">
        <input id="wallet">
        <button onclick="withdraw()">Withdraw</button>
    </div>
</div>

<div class="tabs">
    <div class="tab active" onclick="tab('faucet')">Faucet</div>
    <div class="tab" onclick="tab('withdraw')">Withdraw</div>
</div>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user;
const device = navigator.userAgent + screen.width;

function tab(t){
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(v=>v.classList.remove("active"));

    document.getElementById(t).classList.add("active");
    event.target.classList.add("active");
}

async function claim(){
    const r = await fetch("https://YOUR-API/claim",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            user_id:user.id,
            initData:tg.initData,
            device:device,
            ip:"client"
        })
    });

    const d = await r.json();
    alert(d.ok ? "+"+d.reward : d.error);
}

async function withdraw(){
    const wallet = document.getElementById("wallet").value;

    const r = await fetch("https://YOUR-API/withdraw",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            user_id:user.id,
            wallet:wallet,
            initData:tg.initData
        })
    });

    const d = await r.json();
    alert(d.ok ? "OK" : "error");
}
</script>

</body>
</html>
